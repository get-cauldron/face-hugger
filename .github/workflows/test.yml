name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allow release.yml to call this workflow

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    env:
      HAS_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Frontend unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        run: npx playwright test

      - name: HF API smoke tests
        if: env.HF_TEST_TOKEN != ''
        env:
          HF_TEST_TOKEN: ${{ secrets.HF_TEST_TOKEN }}
        run: npx playwright test tests/e2e/smoke/

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Rust integration tests
        if: matrix.platform != 'windows-latest'
        run: cargo test --manifest-path src-tauri/Cargo.toml --test commands_test --test auth_test

      # tauri-driver native tests (Linux/Windows only — no WKWebView driver on macOS)
      # Skipped when TAURI_SIGNING_PRIVATE_KEY is not configured (required to build the binary)
      - name: Install tauri-driver
        if: matrix.platform != 'macos-latest' && env.HAS_SIGNING_KEY == 'true'
        run: cargo install tauri-driver --locked

      - name: Build Tauri binary for native tests
        if: matrix.platform != 'macos-latest' && env.HAS_SIGNING_KEY == 'true'
        run: npx tauri build --debug
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Install native test dependencies
        if: matrix.platform != 'macos-latest' && env.HAS_SIGNING_KEY == 'true'
        run: npm ci --prefix tests/native

      - name: Install webkit2gtk-driver (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04' && env.HAS_SIGNING_KEY == 'true'
        run: sudo apt-get install -y webkit2gtk-driver

      - name: Native tests (Linux - headless via xvfb)
        if: matrix.platform == 'ubuntu-22.04' && env.HAS_SIGNING_KEY == 'true'
        run: xvfb-run npm run test:native --prefix tests/native

      - name: Native tests (Windows)
        if: matrix.platform == 'windows-latest' && env.HAS_SIGNING_KEY == 'true'
        run: npm run test:native --prefix tests/native
